<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestra historia 💖</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#fce4ec, #e1bee7);
    font-family: 'Georgia', serif;
    padding: 20px;
}

/* Contenedor */
.album {
    max-width: 600px;
    margin: auto;
}

/* Secciones */
.seccion {
    background: rgba(255,255,255,0.95);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    animation: aparecer 1.5s ease;
}

/* Animación */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    color: #8e24aa;
}

/* Fotos */
.foto {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 10px;
}

/* Corazón música */
.music-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    animation: latido 1s infinite, brillo 1.5s infinite;
}

/* Latido */
@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* Brillo */
@keyframes brillo {
    0% {
        text-shadow: 0 0 5px #ff80ab, 0 0 10px #ff80ab;
    }
    50% {
        text-shadow: 0 0 15px #ff4081, 0 0 25px #ff4081;
    }
    100% {
        text-shadow: 0 0 5px #ff80ab, 0 0 10px #ff80ab;
    }
}
</style>

</head>

<body>

<div class="album">

    <div class="seccion">
        <h2>El inicio ✨</h2>
        <p>Aquí empieza nuestra historia...</p>
        <img src="foto1.jpg" class="foto">
    </div>

    <div class="seccion">
        <h2>Momentos 💕</h2>
        <p>Recuerdos que nunca olvidaré...</p>
        <img src="foto2.jpg" class="foto">
    </div>

    <div class="seccion">
        <h2>Hoy 💌</h2>
        <p>Lo que siento ahora...</p>
        <img src="io.jpg" class="foto">
    </div>

</div>

<!-- Música -->
<audio id="musica" autoplay loop>
    <source src="favorito.m4a" type="audio/mpeg">
</audio>

<!-- Corazón -->
<div class="music-player" onclick="toggleMusic()">
    💕
</div>

<script>
let musica = document.getElementById("musica");

function toggleMusic() {
    if (musica.paused) {
        musica.play();
    } else {
        musica.pause();
    }
}
</script>

</body>
</html>
